<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Colección personal de sellos postales de Alejandro Gómez. Estampillas argentinas y del mundo.">
    <meta name="author" content="Alejandro Gómez">
    <title>Mi Colección de Sellos</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <header>
        <h1>Mi Colección de Sellos</h1>
        <p class="subtitulo">Estampillas postales reunidas con pasión y dedicación</p>
    </header>

    <main>
        <section class="galeria">
            <h2>Galería de Sellos</h2>

            <article class="sello">
                <figure>
                    <img
                        src="imagenes/arg_001.webp"
                        alt="Sello postal argentino - ARG 001"
                        width="400"
                    >
                    <figcaption>
                        <h3>Argentina · ARG-001</h3>
                        <p>
                            Sello postal de la República Argentina. Pieza de colección que forma parte
                            del catálogo inicial de esta galería. Su diseño refleja la riqueza histórica
                            y cultural del país, siendo un ejemplar de referencia para coleccionistas
                            de filatelia sudamericana.
                        </p>
                        <p class="meta">País: Argentina &mdash; Código: ARG-001</p>
                    </figcaption>
                </figure>
            </article>

        </section>
    </main>

    <footer>
        <p>&copy; 2026 Alejandro Gómez &mdash; Mi Colección de Sellos</p>
    </footer>

</body>

</html>
